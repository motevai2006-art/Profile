<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0d0b;
      --surface: #161410;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --cream: #f0e8d5;
      --muted: #7a7060;
      --border: rgba(201,168,76,0.2);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--cream);
      font-family: 'Cormorant Garamond', Georgia, serif;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.5;
    }

    /* Background subtle radial glow */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 40%, rgba(201,168,76,0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      max-width: 400px;
      width: 100%;
      animation: fadeUp 1s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Photo Frame ── */
    .photo-wrapper {
      position: relative;
      width: 180px;
      height: 180px;
      animation: fadeUp 1s 0.1s ease both;
    }

    /* Rotating dashed ring */
    .photo-wrapper::before {
      content: '';
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      border: 1.5px dashed var(--gold);
      animation: spin 12s linear infinite;
      opacity: 0.6;
    }

    /* Static solid ring */
    .photo-wrapper::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1px solid var(--border);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Corner ornaments */
    .photo-wrapper .orns {
      position: absolute;
      inset: -20px;
      pointer-events: none;
    }
    .photo-wrapper .orns span {
      position: absolute;
      width: 10px;
      height: 10px;
      border-color: var(--gold);
      border-style: solid;
      opacity: 0.8;
    }
    .photo-wrapper .orns span:nth-child(1) { top: 0; left: 0;  border-width: 2px 0 0 2px; }
    .photo-wrapper .orns span:nth-child(2) { top: 0; right: 0; border-width: 2px 2px 0 0; }
    .photo-wrapper .orns span:nth-child(3) { bottom: 0; left: 0;  border-width: 0 0 2px 2px; }
    .photo-wrapper .orns span:nth-child(4) { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

    /* Diamond gems on ring */
    .gems {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      pointer-events: none;
    }
    .gems::before, .gems::after {
      content: '';
      position: absolute;
      width: 6px; height: 6px;
      background: var(--gold-light);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--gold);
    }
    .gems::before { top: -3px; left: 50%; transform: translateX(-50%); }
    .gems::after  { bottom: -3px; left: 50%; transform: translateX(-50%); }

    .photo {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      border: 3px solid var(--gold);
      box-shadow: 0 0 0 2px var(--bg), 0 0 30px rgba(201,168,76,0.3), inset 0 0 20px rgba(0,0,0,0.5);
      background: var(--surface);
      /* Placeholder gradient if no image */
      background-image: linear-gradient(135deg, #2a2418 0%, #1a1610 50%, #2a2418 100%);
    }

    /* Initials placeholder */
    .photo-placeholder {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 3px solid var(--gold);
      box-shadow: 0 0 0 2px var(--bg), 0 0 30px rgba(201,168,76,0.3);
      background: linear-gradient(135deg, #2a2418 0%, #1a1610 50%, #2a2418 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 300;
      color: var(--gold-light);
      letter-spacing: 0.1em;
      text-shadow: 0 0 20px rgba(201,168,76,0.4);
    }

    /* ── Name & Title ── */
    .name {
      font-size: clamp(2rem, 6vw, 2.8rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-align: center;
      color: var(--cream);
      line-height: 1;
      animation: fadeUp 1s 0.2s ease both;
      text-transform: uppercase;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      width: 100%;
      animation: fadeUp 1s 0.3s ease both;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold));
    }
    .divider::after {
      background: linear-gradient(to left, transparent, var(--gold));
    }
    .divider-diamond {
      width: 5px; height: 5px;
      background: var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    .hobby {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
      text-align: center;
      animation: fadeUp 1s 0.4s ease both;
    }

    .bio {
      font-size: 1rem;
      font-weight: 300;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
      max-width: 300px;
      animation: fadeUp 1s 0.45s ease both;
    }

    /* ── Social Links ── */
    .socials {
      display: flex;
      gap: 1.2rem;
      align-items: center;
      animation: fadeUp 1s 0.5s ease both;
    }

    .social-link {
      position: relative;
      width: 42px; height: 42px;
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      text-decoration: none;
      transition: all 0.3s ease;
      overflow: hidden;
    }
    .social-link::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(201,168,76,0.15), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .social-link:hover {
      border-color: var(--gold);
      color: var(--gold-light);
      box-shadow: 0 0 16px rgba(201,168,76,0.25);
      transform: translateY(-2px);
    }
    .social-link:hover::before { opacity: 1; }

    .social-link svg {
      width: 16px; height: 16px;
      fill: currentColor;
      position: relative;
      z-index: 1;
    }

    /* ── Footer ── */
    .footer-line {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      color: rgba(122,112,96,0.4);
      text-transform: uppercase;
      animation: fadeUp 1s 0.6s ease both;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .photo-wrapper, .photo, .photo-placeholder { width: 150px; height: 150px; }
      .name { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
